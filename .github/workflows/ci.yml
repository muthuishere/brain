name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  # Polyglot shield ports (libs/{python,js,rust}) each conform to the same
  # language-neutral golden vectors in conformance/cases/shield.json — a
  # drifting port (e.g. reintroducing the fail-open bug) fails its own CI job.
  shield-conformance-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/python/brain_shield
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: python -m pytest tests/ -v

  shield-conformance-ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/js/brain-shield
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  shield-conformance-rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/rust/brain-shield
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - run: cargo test
